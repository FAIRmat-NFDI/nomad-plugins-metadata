---
title: NOMAD Plugin Metadata Schema
name: nomad_plugin_metadata
version: 1.0.0
id: https://fairmat-nfdi.github.io/nomad-plugins-metadata/schema/nomad_plugin_metadata
prefixes:
  linkml: https://w3id.org/linkml/
  schema_org: http://schema.org/
  dc_terms: http://purl.org/dc/terms/
  nomadpm: https://fairmat-nfdi.github.io/nomad-plugins-metadata/schema/
default_prefix: nomadpm
emit_prefixes:
  - nomadpm
imports:
  - linkml:types
default_range: string
description: >-
  Canonical, versioned metadata contract for NOMAD plugins.
  This schema is designed as a datatractor-compatible extension and is intended
  to be the source of truth for plugin metadata exchanged between plugin
  repositories, crawler ingestion, and documentation registry rendering.

classes:
  PluginPackage:
    tree_root: true
    description: >-
      Top-level metadata object for a single NOMAD plugin package.
    close_mappings:
      - schema_org:SoftwareApplication
    slots:
      - id
      - metadata_schema_version
      - name
      - description
      - plugin_version
      - subject
      - license
      - upstream_repository
      - documentation
      - homepage
      - issue_tracker
      - maintainers
      - repository_default_branch
      - entry_points
      - supported_filetypes
      - capabilities
      - file_format_support
      - schema_dependencies
      - suggested_usages
      - deployment
      - release_context
      - maturity
      - metadata_provenance

  Maintainer:
    description: Maintainer or ownership contact for this plugin.
    slots:
      - name
      - email
      - affiliation
      - role

  EntryPoint:
    description: A registered NOMAD plugin entry point.
    slots:
      - id
      - entry_point_group
      - entry_point_name
      - python_object
      - capability_type

  PluginCapability:
    description: Declares one high-level capability implemented by the plugin.
    slots:
      - id
      - capability_type
      - title
      - summary
      - parser_details

  ParserCapabilityDetails:
    description: Structured parser metadata used for parser discoverability.
    slots:
      - parser_name
      - mainfile_name_re
      - mainfile_contents_re
      - mainfile_mime_re
      - mainfile_binary_header
      - compression_support
      - auxiliary_file_patterns

  FileFormatSupport:
    description: File format support details for a plugin capability.
    slots:
      - id
      - label
      - extensions
      - mime_types
      - standard
      - instrument_context
      - notes

  SchemaDependency:
    description: Declares dependency on plugin/schema packages.
    slots:
      - dependency_type
      - package_name
      - version_range
      - optional
      - purpose

  SuggestedUsage:
    description: Registry-facing usage suggestion for filtering and discovery.
    slots:
      - id
      - title
      - user_intent
      - domain_category
      - technique
      - audience
      - maturity
      - tags

  DeploymentInfo:
    description: Deployment and distribution status for this plugin.
    slots:
      - on_central
      - on_example_oasis
      - on_pypi
      - pypi_package

  ReleaseContext:
    description: Release linkage for generated/effective metadata snapshots.
    slots:
      - release_tag
      - release_commit_sha

  MetadataProvenance:
    description: How metadata was produced.
    slots:
      - source
      - extraction_method
      - generated_at
      - generator_version

slots:
  id:
    identifier: true
    required: true
    slot_uri: schema_org:identifier
    description: Stable machine identifier.

  metadata_schema_version:
    required: true
    description: Version of this metadata schema used for this document.

  name:
    required: true
    slot_uri: schema_org:name

  description:
    required: false
    slot_uri: schema_org:description

  plugin_version:
    required: false
    description: Plugin package version.

  subject:
    multivalued: true
    required: false
    slot_uri: dc_terms:subject
    description: Domain subjects or topical keywords.

  license:
    required: false
    slot_uri: schema_org:license

  upstream_repository:
    required: true
    slot_uri: schema_org:codeRepository

  documentation:
    required: false
    slot_uri: schema_org:url

  homepage:
    required: false
    slot_uri: schema_org:url

  issue_tracker:
    required: false

  maintainers:
    multivalued: true
    inlined_as_list: true
    range: Maintainer

  affiliation:
    required: false

  role:
    required: false

  email:
    required: false

  repository_default_branch:
    required: false

  entry_points:
    multivalued: true
    inlined_as_list: true
    range: EntryPoint

  entry_point_group:
    required: true
    description: Python entry point group name.

  entry_point_name:
    required: true
    description: Entry point identifier within the group.

  python_object:
    required: true
    description: Import path for entry point object.

  capability_type:
    required: true
    range: CapabilityType

  title:
    required: true

  summary:
    required: false

  capabilities:
    multivalued: true
    inlined_as_list: true
    range: PluginCapability

  parser_details:
    required: false
    range: ParserCapabilityDetails

  parser_name:
    required: false

  mainfile_name_re:
    required: false

  mainfile_contents_re:
    required: false

  mainfile_mime_re:
    required: false

  mainfile_binary_header:
    required: false

  compression_support:
    multivalued: true
    required: false
    range: CompressionType

  auxiliary_file_patterns:
    multivalued: true
    required: false

  supported_filetypes:
    multivalued: true
    required: false
    description: Datatractor-compatible list of supported filetype IDs.

  file_format_support:
    multivalued: true
    inlined_as_list: true
    range: FileFormatSupport

  label:
    required: true

  extensions:
    multivalued: true
    required: false

  mime_types:
    multivalued: true
    required: false

  standard:
    required: false

  instrument_context:
    required: false

  notes:
    required: false

  schema_dependencies:
    multivalued: true
    inlined_as_list: true
    range: SchemaDependency

  dependency_type:
    required: true
    range: DependencyType

  package_name:
    required: true

  version_range:
    required: false

  optional:
    required: false
    range: boolean

  purpose:
    required: false

  suggested_usages:
    multivalued: true
    inlined_as_list: true
    range: SuggestedUsage

  user_intent:
    required: true

  domain_category:
    required: true
    range: DomainCategory

  technique:
    required: false

  audience:
    required: false

  maturity:
    required: true
    range: MaturityLevel

  tags:
    multivalued: true
    required: false

  deployment:
    required: false
    range: DeploymentInfo

  release_context:
    required: false
    range: ReleaseContext

  release_tag:
    required: false

  release_commit_sha:
    required: false

  on_central:
    required: false
    range: boolean

  on_example_oasis:
    required: false
    range: boolean

  on_pypi:
    required: false
    range: boolean

  pypi_package:
    required: false

  metadata_provenance:
    multivalued: true
    inlined_as_list: true
    range: MetadataProvenance

  source:
    required: true
    range: MetadataSource

  extraction_method:
    required: true
    range: ExtractionMethod

  generated_at:
    required: true
    range: datetime

  generator_version:
    required: false

enums:
  CapabilityType:
    permissible_values:
      parser: {}
      schema: {}
      app: {}
      normalizer: {}
      example_upload: {}
      api: {}
      north_tool: {}
      tool: {}

  DomainCategory:
    permissible_values:
      simulations: {}
      measurements: {}
      synthesis: {}
      cross-domain: {}
      workflow: {}
      infrastructure: {}

  MaturityLevel:
    permissible_values:
      alpha: {}
      beta: {}
      stable: {}
      archived: {}

  DependencyType:
    permissible_values:
      nomad_plugin: {}
      python_package: {}

  MetadataSource:
    permissible_values:
      manual_override: {}
      plugin_entry_points: {}
      pyproject: {}
      citation_cff: {}
      repository_api: {}
      crawler_fallback: {}

  ExtractionMethod:
    permissible_values:
      deterministic: {}
      heuristic: {}
      manual: {}

  CompressionType:
    permissible_values:
      gz: {}
      bz2: {}
      xz: {}
      zip: {}
      tar: {}
