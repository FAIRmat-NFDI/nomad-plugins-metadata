name: check-plugin-metadata

on:
  pull_request:
    branches: [main]

jobs:
  metadata-check:
    # Pin this reusable workflow to a stable tag/commit once available.
    uses: FAIRmat-NFDI/nomad-plugins-metadata/.github/workflows/extract-plugin-metadata.yml@main
    permissions:
      contents: read
    with:
      # Before PyPI release:
      package_spec: git+https://github.com/FAIRmat-NFDI/nomad-plugins-metadata.git@main
      # After PyPI release, switch to:
      # package_spec: nomad-plugins-metadata==<PINNED_VERSION>
      check_only: true
