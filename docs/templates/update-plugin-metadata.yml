name: update-plugin-metadata

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  extract:
    # Pin this reusable workflow to a stable tag/commit once available.
    uses: FAIRmat-NFDI/nomad-plugins-metadata/.github/workflows/extract-plugin-metadata.yml@main
    permissions:
      contents: write
      pull-requests: write
    with:
      # Recommended: pin a stable Git tag/commit (example tag shown).
      package_spec: git+https://github.com/FAIRmat-NFDI/nomad-plugins-metadata.git@v1.0.0
      # TODO: switch to pinned PyPI package once published.
      # package_spec: nomad-plugins-metadata==<PINNED_VERSION>
      check_only: false
      auto_commit: false
      create_pr: true
      release_tag: ${{ github.event.release.tag_name || '' }}
      release_sha: ${{ github.sha }}
