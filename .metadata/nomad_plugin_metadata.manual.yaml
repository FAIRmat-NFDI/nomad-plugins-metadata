# Maintainer-owned metadata overrides and manual additions.
# This file is never machine-overwritten after creation.
# Use null/empty values as placeholders; only non-empty values override auto output.
# list[str] domain/topic tags (e.g. "simulations", "spectroscopy")
subject:
  - infrastructure
  - metadata
  - schema
  - plugin-development
# enum {alpha, beta, stable, archived}
maturity: beta
# str, e.g. "main"
repository_default_branch: main

# Deployment flags.
deployment:
  # boolean
  on_central: false
  # boolean
  on_example_oasis: false
  # boolean
  on_pypi: false
  # str (PyPI package name)
  pypi_package: nomad-plugins-metadata

# Suggested usages for registry filtering/discovery.
suggested_usages:
  -
    # str (stable ID slug), e.g. "parse-xrd-patterns"
    id: generate-plugin-metadata
    # str
    title: Generate plugin metadata artifacts
    # str (what user wants to do), e.g. "Import and parse raw files"
    user_intent: Generate and merge canonical plugin metadata from plugin repository sources.
    # enum {simulations, measurements, synthesis, cross-domain, workflow, infrastructure}
    domain_category: infrastructure
    # str, e.g. "XRD", "DFT"
    technique: metadata extraction
    # str, e.g. "beginner", "expert"
    audience: plugin maintainers
    # enum {alpha, beta, stable, archived}
    maturity: stable
    # list[str]
    tags:
      - metadata
      - extraction
      - schema
      - ci
  -
    # str (stable ID slug), e.g. "parse-xrd-patterns"
    id: maintain-schema-contract
    # str
    title: Maintain canonical plugin metadata schema
    # str (what user wants to do), e.g. "Import and parse raw files"
    user_intent: Evolve and validate the NOMAD-first schema while preserving interoperability checks.
    # enum {simulations, measurements, synthesis, cross-domain, workflow, infrastructure}
    domain_category: workflow
    # str, e.g. "XRD", "DFT"
    technique: schema governance
    # str, e.g. "beginner", "expert"
    audience: registry maintainers
    # enum {alpha, beta, stable, archived}
    maturity: stable
    # list[str]
    tags:
      - linkml-export
      - validation
      - compatibility

# Optional file format metadata enrichments.
file_format_support: []
