name: extract-plugin-metadata

on:
  workflow_call:
    inputs:
      python_version:
        description: Python version to use for extraction.
        required: false
        type: string
        default: '3.12'
      uv_version:
        description: uv version to use.
        required: false
        type: string
        default: '0.9'
      package_spec:
        description: Package spec to install (pin recommended).
        required: false
        type: string
        default: 'nomad-plugins-metadata'
      install_repo_package:
        description: Install the target plugin repository before extraction.
        required: false
        type: boolean
        default: true
      install_repo_extras:
        description: Optional extras selector for editable install (without brackets), e.g. dev.
        required: false
        type: string
        default: ''
      repo_path:
        description: Repository root path.
        required: false
        type: string
        default: '.'
      manual_path:
        description: Manual metadata template/override file path (maintainer-owned).
        required: false
        type: string
        default: '.metadata/nomad_plugin_metadata.manual.yaml'
      auto_path:
        description: Automation-generated metadata file path.
        required: false
        type: string
        default: '.metadata/nomad_plugin_metadata.auto.yaml'
      effective_path:
        description: Effective merged metadata file path (query-facing).
        required: false
        type: string
        default: 'nomad_plugin_metadata.yaml'
      report_path:
        description: Override report file path.
        required: false
        type: string
        default: '.metadata/plugin-metadata.override-report.yaml'
      release_tag:
        description: Release tag to embed in generated/effective metadata.
        required: false
        type: string
        default: ''
      release_sha:
        description: Release commit SHA to embed in generated/effective metadata.
        required: false
        type: string
        default: ''
      create_pr:
        description: Create/update a rolling PR when metadata changes are detected.
        required: false
        type: boolean
        default: false
      pr_branch:
        description: Rolling PR branch name.
        required: false
        type: string
        default: 'bot/update-plugin-metadata'
      pr_title:
        description: Pull request title.
        required: false
        type: string
        default: 'chore: update plugin metadata'
      pr_body:
        description: Additional pull request body text.
        required: false
        type: string
        default: ''
      auto_commit:
        description: Commit and push generated files if changed.
        required: false
        type: boolean
        default: false
      check_only:
        description: Fail if auto/manual/effective/report files differ after extraction.
        required: false
        type: boolean
        default: false
      commit_message:
        description: Commit message for auto-commit mode.
        required: false
        type: string
        default: 'chore: update plugin metadata artifacts'
    secrets:
      token:
        required: false

  workflow_dispatch:
    inputs:
      python_version:
        description: Python version to use for extraction.
        required: false
        type: string
        default: '3.12'
      uv_version:
        description: uv version to use.
        required: false
        type: string
        default: '0.9'
      package_spec:
        description: Package spec to install (pin recommended).
        required: false
        type: string
        default: 'nomad-plugins-metadata'
      install_repo_package:
        description: Install the target plugin repository before extraction.
        required: false
        type: boolean
        default: true
      install_repo_extras:
        description: Optional extras selector for editable install (without brackets), e.g. dev.
        required: false
        type: string
        default: ''
      repo_path:
        description: Repository root path.
        required: false
        type: string
        default: '.'
      manual_path:
        description: Manual metadata template/override file path (maintainer-owned).
        required: false
        type: string
        default: '.metadata/nomad_plugin_metadata.manual.yaml'
      auto_path:
        description: Automation-generated metadata file path.
        required: false
        type: string
        default: '.metadata/nomad_plugin_metadata.auto.yaml'
      effective_path:
        description: Effective merged metadata file path (query-facing).
        required: false
        type: string
        default: 'nomad_plugin_metadata.yaml'
      report_path:
        description: Override report file path.
        required: false
        type: string
        default: '.metadata/plugin-metadata.override-report.yaml'
      release_tag:
        description: Release tag to embed in generated/effective metadata.
        required: false
        type: string
        default: ''
      release_sha:
        description: Release commit SHA to embed in generated/effective metadata.
        required: false
        type: string
        default: ''
      create_pr:
        description: Create/update a rolling PR when metadata changes are detected.
        required: false
        type: boolean
        default: false
      pr_branch:
        description: Rolling PR branch name.
        required: false
        type: string
        default: 'bot/update-plugin-metadata'
      pr_title:
        description: Pull request title.
        required: false
        type: string
        default: 'chore: update plugin metadata'
      pr_body:
        description: Additional pull request body text.
        required: false
        type: string
        default: ''
      auto_commit:
        description: Commit and push generated files if changed.
        required: false
        type: boolean
        default: false
      check_only:
        description: Fail if auto/manual/effective/report files differ after extraction.
        required: false
        type: boolean
        default: false
      commit_message:
        description: Commit message for auto-commit mode.
        required: false
        type: string
        default: 'chore: update plugin metadata artifacts'

permissions:
  contents: write
  pull-requests: write

jobs:
  extract:
    runs-on: ubuntu-latest
    env:
      UV_SYSTEM_PYTHON: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.token || github.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ inputs.uv_version }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install extractor package
        run: |
          uv pip install "${{ inputs.package_spec }}"

      - name: Install target plugin package
        if: ${{ inputs.install_repo_package }}
        run: |
          if [ -n "${{ inputs.install_repo_extras }}" ]; then
            uv pip install -e "${{ inputs.repo_path }}[${{ inputs.install_repo_extras }}]"
          else
            uv pip install -e "${{ inputs.repo_path }}"
          fi

      - name: Ensure metadata artifact README
        run: |
          mkdir -p .metadata
          if [ ! -f .metadata/README.md ]; then
            cat > .metadata/README.md <<'EOF'
          # `.metadata/` metadata artifact

          This directory contains workflow-managed metadata artifacts from `nomad-plugin-metadata extract`.

          ## File and meaning

          - `nomad_plugin_metadata.manual.yaml`
            - Maintainer-owned override/template file.
            - Created automatically if missing.
          - `nomad_plugin_metadata.auto.yaml`
            - Machine-generated baseline metadata.
          - `plugin-metadata.override-report.yaml`
            - Conflict report between machine-generated `auto` metadata and non-empty maintainer values from `manual`.
            - Contains only conflicting fields.
            - Rewritten on each extraction run (not appended).

          ## Editing rules

          - Do not edit `.metadata/plugin-metadata.override-report.yaml` manually.
          - Maintainer edits belong in `.metadata/nomad_plugin_metadata.manual.yaml`.

          ## Reset note

          - Removing files under `.metadata/` resets manual/auto/report artifacts.
          - Effective metadata remains at repository root: `nomad_plugin_metadata.yaml`.
          EOF
          fi

      - name: Run metadata extraction
        run: |
          CMD=(nomad-plugin-metadata extract \
            --repo-path "${{ inputs.repo_path }}" \
            --manual-path "${{ inputs.manual_path }}" \
            --auto-path "${{ inputs.auto_path }}" \
            --effective-path "${{ inputs.effective_path }}" \
            --report-path "${{ inputs.report_path }}")

          if [ -n "${{ inputs.release_tag }}" ]; then
            CMD+=(--release-tag "${{ inputs.release_tag }}")
          fi

          if [ -n "${{ inputs.release_sha }}" ]; then
            CMD+=(--release-sha "${{ inputs.release_sha }}")
          fi

          "${CMD[@]}"

      - name: Upload metadata artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-metadata
          path: |
            ${{ inputs.auto_path }}
            ${{ inputs.manual_path }}
            ${{ inputs.effective_path }}
            ${{ inputs.report_path }}
            .metadata/README.md

      - name: Collect metadata diff
        id: diff
        run: |
          FILES=("${{ inputs.auto_path }}" "${{ inputs.manual_path }}" "${{ inputs.effective_path }}" "${{ inputs.report_path }}" ".metadata/README.md")

          STATUS="$(git status --porcelain -- "${FILES[@]}")"

          if [ -n "$STATUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "changed_files<<EOF"
            echo "$STATUS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check metadata sync
        if: ${{ inputs.check_only }}
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "::error title=Plugin metadata out of sync::Run 'nomad-plugin-metadata extract --repo-path .' locally and commit updated metadata files."
            echo "### Metadata check failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Metadata files are out of date for this branch." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Run locally:" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
            echo "nomad-plugin-metadata extract --repo-path ." >> "$GITHUB_STEP_SUMMARY"
            echo "git add .metadata/nomad_plugin_metadata.auto.yaml .metadata/nomad_plugin_metadata.manual.yaml nomad_plugin_metadata.yaml .metadata/plugin-metadata.override-report.yaml .metadata/README.md" >> "$GITHUB_STEP_SUMMARY"
            echo "git commit -m \"chore: update plugin metadata artifacts\"" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Changed files:" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            echo "${{ steps.diff.outputs.changed_files }}" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Prepare PR body
        id: prbody
        if: ${{ inputs.create_pr && !inputs.check_only && steps.diff.outputs.changed == 'true' }}
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          EXTRA_BODY: ${{ inputs.pr_body }}
          CHANGED_FILES: ${{ steps.diff.outputs.changed_files }}
        run: |
          {
            echo "body<<EOF"
            echo "This PR updates generated plugin metadata artifacts."
            echo ""
            echo "- Release tag: \`${RELEASE_TAG:-n/a}\`"
            echo "- Release commit SHA: \`${RELEASE_SHA:-n/a}\`"
            echo ""
            echo "Changed files:"
            echo "\`\`\`"
            echo "$CHANGED_FILES"
            echo "\`\`\`"
            echo ""
            if [ -n "$EXTRA_BODY" ]; then
              echo "$EXTRA_BODY"
              echo ""
            fi
            echo "If overrides/extensions are needed before merge:"
            echo "1. For autogenerated fields you want to change, copy the field from \`.metadata/nomad_plugin_metadata.auto.yaml\` into \`.metadata/nomad_plugin_metadata.manual.yaml\` and edit it there."
            echo "2. Fill manual-only or conditional fields directly in \`.metadata/nomad_plugin_metadata.manual.yaml\`."
            echo "3. Run \`nomad-plugin-metadata extract --repo-path .\`."
            echo "4. Commit updated \`.metadata/nomad_plugin_metadata.manual.yaml\`, \`nomad_plugin_metadata.yaml\`, \`.metadata/plugin-metadata.override-report.yaml\`, and \`.metadata/README.md\` (if changed)."
            echo ""
            echo "Maintainers can then review and merge."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update metadata PR
        if: ${{ inputs.create_pr && !inputs.check_only && steps.diff.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.token || github.token }}
          base: main
          branch: ${{ inputs.pr_branch }}
          title: ${{ inputs.pr_title }}
          body: ${{ steps.prbody.outputs.body }}
          commit-message: ${{ inputs.commit_message }}
          delete-branch: false
          add-paths: |
            ${{ inputs.auto_path }}
            ${{ inputs.manual_path }}
            ${{ inputs.effective_path }}
            ${{ inputs.report_path }}
            .metadata/README.md

      - name: No metadata changes
        if: ${{ inputs.create_pr && !inputs.check_only && steps.diff.outputs.changed != 'true' }}
        run: |
          echo "No metadata changes detected; no PR created/updated." >> "$GITHUB_STEP_SUMMARY"

      - name: Commit generated metadata
        if: ${{ inputs.auto_commit && !inputs.check_only && !inputs.create_pr }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${{ inputs.auto_path }}" "${{ inputs.manual_path }}" "${{ inputs.effective_path }}" "${{ inputs.report_path }}" ".metadata/README.md"

          if git diff --cached --quiet; then
            echo "No metadata changes to commit."
            exit 0
          fi

          git commit -m "${{ inputs.commit_message }}"
          git push
