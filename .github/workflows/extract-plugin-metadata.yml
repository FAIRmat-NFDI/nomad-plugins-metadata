name: extract-plugin-metadata

on:
  workflow_call:
    inputs:
      python_version:
        description: Python version to use for extraction.
        required: false
        type: string
        default: '3.12'
      uv_version:
        description: uv version to use.
        required: false
        type: string
        default: '0.9'
      package_spec:
        description: Package spec to install (pin recommended).
        required: false
        type: string
        default: 'nomad-plugins-metadata'
      repo_path:
        description: Repository root path.
        required: false
        type: string
        default: '.'
      manual_path:
        description: Manual metadata override file path.
        required: false
        type: string
        default: 'nomad_plugin_metadata.yaml'
      generated_path:
        description: Generated metadata file path.
        required: false
        type: string
        default: '.nomad/plugin-metadata.generated.yaml'
      effective_path:
        description: Effective merged metadata file path.
        required: false
        type: string
        default: '.nomad/plugin-metadata.effective.yaml'
      report_path:
        description: Override report file path.
        required: false
        type: string
        default: '.nomad/plugin-metadata.override-report.yaml'
      release_tag:
        description: Release tag to embed in generated/effective metadata.
        required: false
        type: string
        default: ''
      release_sha:
        description: Release commit SHA to embed in generated/effective metadata.
        required: false
        type: string
        default: ''
      forward_file_path:
        description: Forward-facing metadata file to update when create_pr is enabled.
        required: false
        type: string
        default: 'nomad_plugin_metadata.yaml'
      create_pr:
        description: Create/update a rolling PR when metadata changes are detected.
        required: false
        type: boolean
        default: false
      pr_branch:
        description: Rolling PR branch name.
        required: false
        type: string
        default: 'bot/update-plugin-metadata'
      pr_title:
        description: Pull request title.
        required: false
        type: string
        default: 'chore: update plugin metadata'
      pr_body:
        description: Additional pull request body text.
        required: false
        type: string
        default: ''
      auto_commit:
        description: Commit and push generated files if changed.
        required: false
        type: boolean
        default: false
      check_only:
        description: Fail if generated/effective/report files differ after extraction.
        required: false
        type: boolean
        default: false
      commit_message:
        description: Commit message for auto-commit mode.
        required: false
        type: string
        default: 'chore: update generated plugin metadata'
    secrets:
      token:
        required: false

  workflow_dispatch:
    inputs:
      python_version:
        description: Python version to use for extraction.
        required: false
        type: string
        default: '3.12'
      uv_version:
        description: uv version to use.
        required: false
        type: string
        default: '0.9'
      package_spec:
        description: Package spec to install (pin recommended).
        required: false
        type: string
        default: 'nomad-plugins-metadata'
      repo_path:
        description: Repository root path.
        required: false
        type: string
        default: '.'
      manual_path:
        description: Manual metadata override file path.
        required: false
        type: string
        default: 'nomad_plugin_metadata.yaml'
      generated_path:
        description: Generated metadata file path.
        required: false
        type: string
        default: '.nomad/plugin-metadata.generated.yaml'
      effective_path:
        description: Effective merged metadata file path.
        required: false
        type: string
        default: '.nomad/plugin-metadata.effective.yaml'
      report_path:
        description: Override report file path.
        required: false
        type: string
        default: '.nomad/plugin-metadata.override-report.yaml'
      release_tag:
        description: Release tag to embed in generated/effective metadata.
        required: false
        type: string
        default: ''
      release_sha:
        description: Release commit SHA to embed in generated/effective metadata.
        required: false
        type: string
        default: ''
      forward_file_path:
        description: Forward-facing metadata file to update when create_pr is enabled.
        required: false
        type: string
        default: 'nomad_plugin_metadata.yaml'
      create_pr:
        description: Create/update a rolling PR when metadata changes are detected.
        required: false
        type: boolean
        default: false
      pr_branch:
        description: Rolling PR branch name.
        required: false
        type: string
        default: 'bot/update-plugin-metadata'
      pr_title:
        description: Pull request title.
        required: false
        type: string
        default: 'chore: update plugin metadata'
      pr_body:
        description: Additional pull request body text.
        required: false
        type: string
        default: ''
      auto_commit:
        description: Commit and push generated files if changed.
        required: false
        type: boolean
        default: false
      check_only:
        description: Fail if generated/effective/report files differ after extraction.
        required: false
        type: boolean
        default: false
      commit_message:
        description: Commit message for auto-commit mode.
        required: false
        type: string
        default: 'chore: update generated plugin metadata'

permissions:
  contents: write
  pull-requests: write

jobs:
  extract:
    runs-on: ubuntu-latest
    env:
      UV_SYSTEM_PYTHON: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.token || github.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ inputs.uv_version }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install extractor package
        run: |
          uv pip install "${{ inputs.package_spec }}"

      - name: Run metadata extraction
        run: |
          CMD=(nomad-plugin-metadata extract \
            --repo-path "${{ inputs.repo_path }}" \
            --manual-path "${{ inputs.manual_path }}" \
            --generated-path "${{ inputs.generated_path }}" \
            --effective-path "${{ inputs.effective_path }}" \
            --report-path "${{ inputs.report_path }}")

          if [ -n "${{ inputs.release_tag }}" ]; then
            CMD+=(--release-tag "${{ inputs.release_tag }}")
          fi

          if [ -n "${{ inputs.release_sha }}" ]; then
            CMD+=(--release-sha "${{ inputs.release_sha }}")
          fi

          if [ "${{ inputs.create_pr }}" = "true" ]; then
            CMD+=(--update-front-file "${{ inputs.forward_file_path }}")
          fi

          "${CMD[@]}"

      - name: Upload metadata artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-metadata
          path: |
            ${{ inputs.generated_path }}
            ${{ inputs.effective_path }}
            ${{ inputs.report_path }}
            ${{ inputs.forward_file_path }}

      - name: Collect metadata diff
        id: diff
        run: |
          FILES=("${{ inputs.generated_path }}" "${{ inputs.effective_path }}" "${{ inputs.report_path }}")

          if [ "${{ inputs.create_pr }}" = "true" ]; then
            FILES+=("${{ inputs.forward_file_path }}")
          fi

          STATUS="$(git status --porcelain -- "${FILES[@]}")"

          if [ -n "$STATUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "changed_files<<EOF"
            echo "$STATUS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check metadata sync
        if: ${{ inputs.check_only }}
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "::error title=Plugin metadata out of sync::Run 'nomad-plugin-metadata extract --repo-path .' locally and commit updated .nomad/plugin-metadata files."
            echo "### Metadata check failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Metadata files are out of date for this branch." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Run locally:" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
            echo "nomad-plugin-metadata extract --repo-path ." >> "$GITHUB_STEP_SUMMARY"
            echo "git add .nomad/plugin-metadata.generated.yaml .nomad/plugin-metadata.effective.yaml .nomad/plugin-metadata.override-report.yaml" >> "$GITHUB_STEP_SUMMARY"
            echo "git commit -m \"chore: update generated plugin metadata\"" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Changed files:" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            echo "${{ steps.diff.outputs.changed_files }}" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Prepare PR body
        id: prbody
        if: ${{ inputs.create_pr && !inputs.check_only && steps.diff.outputs.changed == 'true' }}
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          EXTRA_BODY: ${{ inputs.pr_body }}
          CHANGED_FILES: ${{ steps.diff.outputs.changed_files }}
        run: |
          {
            echo "body<<EOF"
            echo "This PR updates generated plugin metadata artifacts."
            echo ""
            echo "- Release tag: \`${RELEASE_TAG:-n/a}\`"
            echo "- Release commit SHA: \`${RELEASE_SHA:-n/a}\`"
            echo ""
            echo "Changed files:"
            echo "\`\`\`"
            echo "$CHANGED_FILES"
            echo "\`\`\`"
            echo ""
            if [ -n "$EXTRA_BODY" ]; then
              echo "$EXTRA_BODY"
              echo ""
            fi
            echo "Maintainers can review, adjust \`nomad_plugin_metadata.yaml\`, and merge."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update metadata PR
        if: ${{ inputs.create_pr && !inputs.check_only && steps.diff.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.token || github.token }}
          base: main
          branch: ${{ inputs.pr_branch }}
          title: ${{ inputs.pr_title }}
          body: ${{ steps.prbody.outputs.body }}
          commit-message: ${{ inputs.commit_message }}
          delete-branch: false
          add-paths: |
            ${{ inputs.generated_path }}
            ${{ inputs.effective_path }}
            ${{ inputs.report_path }}
            ${{ inputs.forward_file_path }}

      - name: No metadata changes
        if: ${{ inputs.create_pr && !inputs.check_only && steps.diff.outputs.changed != 'true' }}
        run: |
          echo "No metadata changes detected; no PR created/updated." >> "$GITHUB_STEP_SUMMARY"

      - name: Commit generated metadata
        if: ${{ inputs.auto_commit && !inputs.check_only && !inputs.create_pr }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${{ inputs.generated_path }}" "${{ inputs.effective_path }}" "${{ inputs.report_path }}"

          if git diff --cached --quiet; then
            echo "No metadata changes to commit."
            exit 0
          fi

          git commit -m "${{ inputs.commit_message }}"
          git push
